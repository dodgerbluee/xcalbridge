<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}xCalBridge{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <header class="container">
        <nav>
            <ul>
                <li><a href="/"><strong>xCalBridge</strong></a></li>
            </ul>
            <ul>
                <li><a href="#" role="button" class="outline theme-toggle" id="theme-toggle" onclick="toggleTheme(event)" aria-label="Toggle dark mode"></a></li>
                <li><a href="/settings" role="button" class="outline" aria-label="Settings">&#9881;</a></li>
                <li><a href="/sources/new" role="button" class="outline">+ Add Source</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>xCalBridge &mdash; Convert sports schedules to ICS feeds</small>
    </footer>

    <script>
    (function() {
        var root = document.documentElement;
        var btn = document.getElementById('theme-toggle');
        var saved = localStorage.getItem('xcb-theme');
        if (saved === 'dark' || saved === 'light') {
            root.setAttribute('data-theme', saved);
        }
        function updateIcon() {
            var theme = root.getAttribute('data-theme');
            if (theme === 'dark') {
                btn.textContent = '\u2600';
            } else if (theme === 'light') {
                btn.textContent = '\u263E';
            } else {
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                btn.textContent = prefersDark ? '\u2600' : '\u263E';
            }
        }
        updateIcon();
        window.toggleTheme = function(e) {
            e.preventDefault();
            var current = root.getAttribute('data-theme');
            var next;
            if (current === 'dark') {
                next = 'light';
            } else {
                next = 'dark';
            }
            root.setAttribute('data-theme', next);
            localStorage.setItem('xcb-theme', next);
            updateIcon();
        };
    })();
    </script>
</body>
</html>
